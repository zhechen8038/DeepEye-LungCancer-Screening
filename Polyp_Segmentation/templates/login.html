<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智瞳</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f9f9 0%, #e6f2ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-size: 200% 200%;
            animation: gradientBg 15s ease infinite;
        }

        @keyframes gradientBg {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 3rem;
            width: 400px;
            max-width: 90%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
        }

        .logo {
            width: 40px;
            height: 40px;
            margin-right: 10px;
        }

        .form-label {
            font-weight: 500;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 0.75rem 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            border-color: #1A73E8;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.2);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1A73E8 0%, #165DBA 100%);
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #165DBA 0%, #1A73E8 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 2px 6px rgba(26, 115, 232, 0.3);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            transition: color 0.2s;
        }

        .password-toggle:hover {
            color: #333;
        }

        .register-link {
            color: #1A73E8;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .register-link:hover {
            color: #165DBA;
            text-decoration: underline;
        }

        /* 自定义提示框样式 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transform: translateX(150%);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-header {
            border-radius: 8px 8px 0 0;
        }

        .bg-success {
            background-color: #4CAF50 !important;
        }

        .bg-danger {
            background-color: #F44336 !important;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="text-center mb-5">
        <h2 class="fw-bold text-primary">登录智瞳</h2>
        <p class="text-muted mt-2">请输入您的账号信息</p>
    </div>
    <form id="loginForm">
        <div class="mb-4">
            <label for="username" class="form-label">用户名</label>
            <div class="position-relative">
                <input type="text" class="form-control" id="username" name="username" required
                       placeholder="请输入用户名">
                <i class="fa fa-user position-absolute end-0 top-0 mt-3 me-3 text-muted"></i>
            </div>
        </div>
        <div class="mb-5">
            <label for="password" class="form-label">密码</label>
            <div class="position-relative">
                <input type="password" class="form-control" id="password" name="password" required
                       placeholder="请输入密码">
                <i class="fa fa-eye-slash password-toggle" id="togglePassword"></i>
            </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">
            <i class="fa fa-sign-in mr-2"></i>登录
        </button>
        <div class="text-center mt-4">
            还没有账号？<a href="/go_to_Register" class="register-link">立即注册</a>
        </div>
    </form>
</div>

<!-- 提示框容器 -->
<div class="toast-container">
    <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="3000">
        <div class="toast-header">
            <strong class="me-auto"><i class="fa fa-exclamation-circle mr-2"></i>系统提示</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
        <div class="toast-body"></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    $(document).ready(function () {
        const toastEl = document.getElementById('liveToast')
        const toast = new bootstrap.Toast(toastEl)

        // 密码可见性切换
        const togglePassword = document.getElementById('togglePassword');
        const password = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            // 切换密码可见性
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);

            // 切换图标
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // 统一错误处理方法
        function showError(message = '网络异常或登录信息错误') {
            $('.toast-header strong').html('<i class="fa fa-times-circle mr-2"></i>登录失败');
            $('.toast-body').text(message);
            $('.toast-header').removeClass('bg-success').addClass('bg-danger text-white');
            toast.show();
        }

        $('#loginForm').submit(function (e) {
            e.preventDefault();
            const formData = $(this).serialize();

            // 添加按钮加载状态
            const submitBtn = $(this).find('button[type="submit"]');
            submitBtn.attr('disabled', true).html('<i class="fa fa-spinner fa-spin mr-2"></i>登录中...');

            $.post('/login', formData)
                    .done(function (data) {
                        if (data.success) {
                            // 成功处理
                            $('.toast-header strong').html('<i class="fa fa-check-circle mr-2"></i>登录成功');
                            $('.toast-body').text('正在跳转到主页面...');
                            $('.toast-header').removeClass('bg-danger').addClass('bg-success text-white');
                            toast.show();

                            setTimeout(() => {
                                window.location.href = '/go_to_First';
                            }, 2000);
                        } else {
                            // 业务失败统一处理
                            showError(data.error || '用户名或密码错误');
                        }
                    })
                    .fail(function (xhr) {
                        // 网络错误统一处理
                        const serverError = xhr.responseJSON?.error;
                        showError(serverError || '网络连接异常，请检查后重试');
                    })
                    .always(function () {
                        // 恢复按钮状态
                        submitBtn.attr('disabled', false).html('<i class="fa fa-sign-in mr-2"></i>登录');
                    });
        });
    });
</script>
</body>
</html>
